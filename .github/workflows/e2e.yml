name: E2E Tests

on:
  push:
    paths:
      - 'policy/**'
      - 'hack/**'
      - 'Dockerfile'
      - 'Makefile'
  pull_request:
    paths:
      - 'policy/**'
      - 'hack/**'
      - 'Dockerfile'
      - 'Makefile'

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      matrix:
        distro: [centos9, centos10, fedora42, microos]

    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    # https://lima-vm.io/docs/examples/gha/
    - name: Install QEMU
      run: |
        set -eux
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ovmf qemu-system-x86 qemu-utils
        sudo modprobe kvm
        sudo chown $(whoami) /dev/kvm

    - name: Install Lima
      run: |
        set -eux
        LIMA_VERSION="v2.1.0"
        FILE="lima-${LIMA_VERSION:1}-Linux-x86_64.tar.gz"
        curl -fOSL "https://github.com/lima-vm/lima/releases/download/${LIMA_VERSION}/${FILE}"
        curl -fOSL "https://github.com/lima-vm/lima/releases/download/${LIMA_VERSION}/SHA256SUMS"
        sha256sum --check --ignore-missing SHA256SUMS
        sudo tar Cxzvf /usr/local "${FILE}"
        rm -f "${FILE}" SHA256SUMS
        echo "LIMA_VERSION=${LIMA_VERSION}" >> $GITHUB_ENV

    - name: Cache ~/.cache/lima
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/lima
        key: lima-${{ env.LIMA_VERSION }}

    - name: E2E ${{ matrix.distro }}
      run: make e2e-${{ matrix.distro }}
